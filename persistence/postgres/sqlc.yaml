version: "2"
sql:
  - engine: postgresql
    queries: sqlc/queries.sql
    schema:
      - migrations/0001_schema.up.sql
      - migrations/0003_je_relations.up.sql
      - migrations/0005_drop_je_relations_amount.up.sql
    gen:
      go:
        package: pgstore
        out: pgstore
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
        emit_json_tags: false
        emit_interface: true
        emit_exact_table_names: false
