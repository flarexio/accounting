# Sample accounting configuration. Copy to config.yaml (gitignored) and edit
# the values for your environment. Every block defaults to the
# in-process / offline option, so an empty file is also valid -- delete
# a block to use the default.

persistence:
  # memory  -> persistence/memory; nothing else needed.
  # postgres -> persistence/postgres; requires the nested postgres block.
  kind: postgres
  postgres:
    dsn: postgres://stoa:stoa@localhost:5432/accounting?sslmode=disable

messaging:
  # inproc -> messaging/inproc; nothing else needed.
  # nats   -> messaging/nats; requires url + stream + consumer. Subjects
  #           are domain constants (e.g. accounting.journal), not config.
  kind: nats
  nats:
    url: nats://localhost:4222
    stream: ACCOUNTING
    consumer: accounting-book-run

llm:
  # kind selects the provider adapter; defaults to openai.
  #   openai    -> stoa/llm/openai;    uses OPENAI_API_KEY when api_key is empty.
  #   anthropic -> stoa/llm/anthropic; uses ANTHROPIC_API_KEY when api_key is empty.
  kind: openai
  # --model overrides this per run.
  model: gpt-5.5
  # api_key may be omitted to use the provider's env var (see kind above).
  api_key: ${OPENAI_API_KEY}
  # base_url may be omitted for the provider default; set for OpenAI-compatible
  # gateways or self-hosted Anthropic-compatible endpoints.
  base_url: https://api.openai.com/v1
  # Openai-only. Set true only for llama.cpp-style servers whose grammar engine
  # enforces response_format at the sampler -- strict json_schema would otherwise
  # block native tool_calls. Leave false (default) for OpenAI and vLLM.
  disable_strict_schema_with_tools: false
  # Anthropic-only. Caps the Messages response length; zero lets the adapter
  # pick its default (4096). Ignored when kind is openai.
  max_tokens: 0

# Example Anthropic block (uncomment and replace the openai block above):
# llm:
#   kind: anthropic
#   model: claude-opus-4-7
#   api_key: ${ANTHROPIC_API_KEY}
#   max_tokens: 4096

embedding:
  # Used only by the postgres adapter to populate the accounts.embedding column
  # and to embed queries in FindAccounts. Memory adapter ignores this block.
  # Dimensions must match the vector column width set by migration 0002
  # (1536 for text-embedding-3-small). Changing dimensions requires a new
  # migration that re-types accounts.embedding accordingly.
  model: text-embedding-3-small
  dimensions: 1536
