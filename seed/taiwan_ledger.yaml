name: taiwan_ledger
description: "東昇商貿股份有限公司月結帳:依《商業會計處理準則》標準會計科目表建立的台灣中小企業總帳,涵蓋買賣、勞務與營業外科目,並含 5% 營業稅的進項/銷項稅額與勞健保代收款。2026-03、2026-04 已關帳,2026-05、2026-06 開帳中。"

company:
  id: dongsheng
  name: 東昇商貿股份有限公司
  timezone: Asia/Taipei
  retained_earnings_code: "3351"

# Transaction-facing accounts carry `aliases` and `description`: everyday
# wording a journal narration might use, so semantic search reaches the right
# account from how the event is described rather than its formal name. Purely
# structural accounts (accumulated depreciation, capital reserves) stay terse.
accounts:
  - code: "1101"
    name: 庫存現金
    type: asset
    active: true
    description: 公司保管的庫存現金
    aliases: [現金, 收現, 付現, 現金收付]
  - code: "1102"
    name: 零用金
    type: asset
    active: true
    description: 供零星支付的備用現金
    aliases: [週轉金, 小額現金, 備用金]
  - code: "1103"
    name: 銀行存款
    type: asset
    active: true
    description: 存放於銀行的活期與支票存款
    aliases: [活存, 支存, 匯款, 轉帳, 銀行帳戶]
  - { code: "1131", name: 應收票據, type: asset, active: true }
  - code: "1141"
    name: 應收帳款
    type: asset
    active: true
    description: 賒銷商品或勞務尚未收取的款項
